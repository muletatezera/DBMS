<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee information</title>
    <link rel="stylesheet" href="./CSS/style.css" />
  </head>
  <body>
    <form action="" class="form-1" id="form-container">
      <div class="form-section">
        <h4>insert the employee information</h4>
        <label for="fname">first name</label>
        <input type="text" name="fname" id="firstName" />
        <label for="lname">last name</label>
        <input type="text" name="lname" id="lastName" />
        <label for="email">Email address</label>
        <input type="email" name="email" id="emailAdress" />
        <label for="cnumber">contact number</label>
        <input type="number" name="cnumber" id="contactNumber" />
        <label for="dbirth">Date of birth</label>
        <input type="date" name="dbirth" id="dateOfBirth" />
        <label for="salary">salary</label>
        <input type="text" name="salary" id="salary" />
        <input type="image" src="" alt="No image found" id="inputImage" />
        <button type="submit" id="submit-btn">Submit</button>
      </div>
    </form>
    <script src="./JS/form-script.js"></script>
  </body>
</html>
